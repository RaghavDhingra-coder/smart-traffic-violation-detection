# TODO for local-orchestration: tune service resources, health checks, and environment-specific overrides for production.
version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: traffic-frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: traffic-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - ai-engine
    volumes:
      - ./backend/uploads:/app/uploads

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: traffic-ai-engine
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./ai-engine/models:/app/models

  postgres:
    image: postgres:16-alpine
    container_name: traffic-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: traffic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: traffic-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
